services:
  homepage:
    image: ghcr.io/gethomepage/homepage:latest
    container_name: homepage
    restart: unless-stopped

    ports:
      - "3000:3000"

    environment:
      PUID: 1000
      PGID: 1000
      HOMEPAGE_ALLOWED_HOSTS: "192.168.50.2:3000"

    volumes:
      - /home/malcolm/docker/homepage:/app/config
      - /var/run/docker.sock:/var/run/docker.sock:ro
